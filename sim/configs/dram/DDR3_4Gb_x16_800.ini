; DDR3-800 (1 GB, x16 device, 32-bit fabric bus) for the DE-10 Nano target.
;
; Derived from DRAMSim3's stock configs/DDR3_4Gb_x16_1600.ini at upstream
; SHA 29817593b3389f1337235d63cac515024ab8fd6e. Deltas vs that file are
; called out per-section below; everything else mirrors stock.

[dram_structure]
protocol         = DDR3
bankgroups       = 1
banks_per_group  = 8
rows             = 32768
columns          = 1024
device_width     = 16
BL               = 8

[timing]
tCK    = 2.5      ; was 1.25 ns at DDR3-1600
AL     = 0
CL     = 6        ; was 11
CWL    = 5        ; was 8
tRCD   = 6        ; was 11
tRP    = 6        ; was 11
tRAS   = 15       ; was 28
tRFC   = 104      ; was 208
tRFC2  = 208
tRFC4  = 208
tREFI  = 3120     ; was 6240 (stock key was misspelled "REFI"; corrected name)
tRPRE  = 0
tWPRE  = 0
tRRD_S = 5
tRRD_L = 5
tWTR_S = 4        ; was 6
tWTR_L = 6
tFAW   = 16       ; was 32
tWR    = 6        ; was 12
tWR2   = 12
tRTP   = 4        ; was 6
tCCD_S = 4
tCCD_L = 4
tCKE   = 4
tCKESR = 5
tXS    = 108      ; was 216
tXP    = 3        ; was 5
tRTRS  = 1

[power]
VDD    = 1.35
IDD0   = 66
IPP0   = 0.0
IDD2P  = 18
IDD2N  = 32
IDD3P  = 38
IDD3N  = 47
IDD4W  = 171
IDD4R  = 235
IDD5AB = 235
IDD6x  = 20

[system]
channel_size      = 1024              ; was 4096 (MiB) -> 1 GB total
channels          = 1
bus_width         = 32                ; was 64 (DE-10 Nano fabric bus)
address_mapping   = rochrababgco
queue_structure   = PER_BANK
refresh_policy    = RANK_LEVEL_STAGGERED
row_buf_policy    = OPEN_PAGE
cmd_queue_size    = 8
trans_queue_size  = 32

[other]
epoch_period = 800000
output_level = 1
